---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: purpleos
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bluefin-dx
image-version: stable-daily 

modules:
  - type: files
    files:
      - source: system
        destination: / 

  - type: rpm-ostree
    repos:
      # Remote URLs and local files (from files/rpm-ostree/) can be mixed here
      - https://brave-browser-rpm-beta.s3.brave.com/brave-browser-beta.repo
      - protonvpn.repo
    install:
      - brave-browser-beta
      - proton-vpn-gnome-desktop
      - https://updates.safing.io/latest/linux_amd64/packages/Portmaster-2.1.18-1.x86_64.rpm

  - type: default-flatpaks
    configurations:
      - notify: true 
        scope: user
        install: 
          - org.signal.Signal
          - io.freetubeapp.FreeTube

  - type: signing 
